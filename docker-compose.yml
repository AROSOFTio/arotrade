version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: arotrade-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arotrade}
      POSTGRES_USER: ${POSTGRES_USER:-arotrade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arotrade} -d ${POSTGRES_DB:-arotrade}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - arotrade

  # Redis Cache & Task Queue
  redis:
    image: redis:7-alpine
    container_name: arotrade-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - arotrade

  # FastAPI Backend
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: arotrade-api
    environment:
      PYTHONUNBUFFERED: 1
      APP_ENV: ${APP_ENV:-production}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-arotrade}
      POSTGRES_USER: ${POSTGRES_USER:-arotrade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change_me}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change_me_32_char_key}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      DERIV_APP_ID: ${DERIV_APP_ID:-}
      DERIV_API_TOKEN_DEMO: ${DERIV_API_TOKEN_DEMO:-}
      ENABLE_LIVE_TRADING: ${ENABLE_LIVE_TRADING:-false}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - arotrade
    command: >
      sh -c "
      alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

  # Celery Worker (Background Tasks)
  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: arotrade-worker
    environment:
      PYTHONUNBUFFERED: 1
      APP_ENV: ${APP_ENV:-production}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-arotrade}
      POSTGRES_USER: ${POSTGRES_USER:-arotrade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    depends_on:
      - postgres
      - redis
      - api
    restart: unless-stopped
    networks:
      - arotrade
    command: celery -A app.workers worker -l info

  # Next.js Frontend
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-AroTrade AI}
    container_name: arotrade-web
    environment:
      NODE_ENV: ${APP_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-AroTrade AI}
      NEXT_PUBLIC_BRAND_COLOR: ${NEXT_PUBLIC_BRAND_COLOR:-#155DFC}
    expose:
      - "3000"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - arotrade

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  arotrade:
    driver: bridge
